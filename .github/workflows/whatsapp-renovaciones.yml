name: WhatsApp Renovaciones Diario

# Cron: domingo a viernes a las 20:00 hora Madrid.
# GitHub Actions usa UTC, así que:
#   · Horario verano (CEST = UTC+2): 20:00 Madrid → 18:00 UTC
#   · Horario invierno (CET  = UTC+1): 20:00 Madrid → 19:00 UTC
# Ambos crons activos según mes para cubrir ambos.
on:
  schedule:
    # Verano: 18:00 UTC (marzo a octubre)
    - cron: '0 18 * 3-10 0-5'
    # Invierno: 19:00 UTC (noviembre a marzo)
    - cron: '0 19 * 1-3,11,12 0-5'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar endpoint TURNO MAÑANA
        env:
          ENDPOINT_URL: ${{ secrets.WHATSAPP_ENDPOINT_URL }}
          CRON_SECRET:  ${{ secrets.WHATSAPP_CRON_SECRET }}
        run: |
          if [ -z "$ENDPOINT_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Faltan secrets WHATSAPP_ENDPOINT_URL o WHATSAPP_CRON_SECRET"
            exit 1
          fi

          DOW=$(TZ='Europe/Madrid' date +%u)
          if [ "$DOW" = "6" ]; then
            echo "Hoy es sábado en Madrid — no se envía aviso."
            exit 0
          fi

          echo "Llamando al endpoint (turno mañana)…"
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            "${ENDPOINT_URL}?secret=${CRON_SECRET}&turno=manana")
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS\:.*//g')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "HTTP $STATUS"
          echo "Body:"
          echo "$BODY"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Turno mañana devolvió status $STATUS"
            exit 1
          fi

      - name: Pausa de 65 segundos (CallMeBot rate-limit)
        run: |
          DOW=$(TZ='Europe/Madrid' date +%u)
          if [ "$DOW" = "6" ]; then exit 0; fi
          sleep 65

      - name: Disparar endpoint TURNO TARDE
        env:
          ENDPOINT_URL: ${{ secrets.WHATSAPP_ENDPOINT_URL }}
          CRON_SECRET:  ${{ secrets.WHATSAPP_CRON_SECRET }}
        run: |
          DOW=$(TZ='Europe/Madrid' date +%u)
          if [ "$DOW" = "6" ]; then
            echo "Sábado, saltando turno tarde."
            exit 0
          fi

          echo "Llamando al endpoint (turno tarde)…"
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            "${ENDPOINT_URL}?secret=${CRON_SECRET}&turno=tarde")
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS\:.*//g')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "HTTP $STATUS"
          echo "Body:"
          echo "$BODY"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Turno tarde devolvió status $STATUS"
            exit 1
          fi
